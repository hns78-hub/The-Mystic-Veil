<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mystic Archive | Reader Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .dashboard-container {
            max-width: 1200px;
            width: 95%;
            margin: 2rem auto;
        }
        
        .reading-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .reading-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 2rem;
            transition: transform 0.3s;
        }
        
        .reading-card:hover {
            transform: scale(1.01);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .client-info h3 {
            font-size: 1.5rem;
            margin-bottom: 0.2rem;
        }
        
        .timestamp {
            font-size: 0.8rem;
            color: var(--color-lavender);
        }
        
        .status-badge {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .status-pending { background: rgba(212, 175, 55, 0.2); color: var(--color-gold); border: 1px solid var(--color-gold); }
        .status-confirmed { background: rgba(0, 255, 0, 0.1); color: #00ff00; border: 1px solid #00ff00; }
        
        .reading-details {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }
        
        .question-text {
            font-style: italic;
            color: #fff;
            margin-bottom: 1.5rem;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-left: 3px solid var(--color-gold);
        }
        
        .visual-display {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }
        
        .mini-card {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: center;
        }
        
        .mini-card img {
            width: 100%;
            border-radius: 5px;
            border: 1px solid var(--color-gold);
        }
        
        .mini-card span {
            font-size: 0.7rem;
            color: var(--color-lavender);
        }
        
        .card-actions {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
        }
        
        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .reading-details { grid-template-columns: 1fr; }
            .visual-display { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body class="app-container">
    <header>
        <div class="logo-container">
            <h1>The Mystic Archive</h1>
            <p class="subtitle">Your Sacred Ledger of Readings</p>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="glass-panel" style="padding: 1.5rem; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="font-size: 1.2rem;">Recent Submissions</h2>
            <div style="display: flex; gap: 1rem;">
                <button onclick="clearHandled()" class="btn-primary btn-small" style="background: rgba(255, 0, 0, 0.2); border: 1px solid #ff4444; color: #ff4444;">Clear Handled Requests</button>
                <button onclick="fetchReadings()" class="btn-primary btn-small">Refresh Ledger</button>
            </div>
        </div>

        <div id="reading-list" class="reading-list">
            <div class="glass-panel" style="text-align: center; padding: 4rem;">
                <p>Consulting the spirits... (Loading entries)</p>
            </div>
        </div>
    </div>

    <div id="login-overlay" class="animate-fade-in" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: flex; align-items: center; justify-content: center;">
        <div class="glass-panel" style="max-width: 400px; text-align: center; border: 1.5px solid var(--color-gold);">
            <div style="font-size: 3rem; margin-bottom: 1.5rem;">🗝️</div>
            <h2 style="margin-bottom: 2rem;">Enter the Sacred Key</h2>
            <div class="form-group">
                <input type="password" id="gatekeeper-key" placeholder="••••••••" style="text-align: center;">
            </div>
            <button onclick="unlockArchive()" class="btn-primary" style="margin-top: 1rem; width: 100%;">Unlock the Archive</button>
            <p id="key-error" style="color: #ff4444; font-size: 0.8rem; margin-top: 1rem; display: none;">The universe does not recognize that key.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://skkhzcztrizlhzhkbsuz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_X_KocDCiVnjOuGzxG33p8w_bNriCrSH";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- AUTH LOGIC ---
        function unlockArchive() {
            const key = document.getElementById('gatekeeper-key').value;
            const errorEl = document.getElementById('key-error');
            
            // Your default password. Feel free to change this!
            if (key === "mystic2026") {
                document.getElementById('login-overlay').style.display = 'none';
                fetchReadings();
            } else {
                errorEl.style.display = 'block';
                document.getElementById('gatekeeper-key').value = "";
            }
        }

        async function fetchReadings() {
            const listEl = document.getElementById('reading-list');
            
            try {
                const { data, error } = await _supabase
                    .from('readings')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    listEl.innerHTML = `
                        <div class="glass-panel" style="text-align: center; padding: 4rem;">
                            <p>The ledger is empty. No readings have been cast yet.</p>
                        </div>
                    `;
                    return;
                }

                listEl.innerHTML = data.map(reading => `
                    <div class="reading-card animate-fade-in">
                        <div class="card-header">
                            <div class="client-info">
                                <h3>${reading.name}</h3>
                                <div class="timestamp">${new Date(reading.created_at).toLocaleString()} | ${reading.email}</div>
                            </div>
                            <span class="status-badge status-${reading.status}">${reading.status}</span>
                        </div>
                        
                        <div class="reading-details">
                            <div class="context">
                                <p style="font-size: 0.8rem; text-transform: uppercase; color: var(--color-gold);">Question:</p>
                                <div class="question-text">"${reading.question}"</div>
                                
                                <p style="font-size: 0.8rem; text-transform: uppercase; color: var(--color-gold);">Notes:</p>
                                <p style="color: var(--color-lavender); font-size: 0.9rem;">${reading.message || "No additional notes provided."}</p>
                            </div>
                            
                            <div class="visual-display" style="display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem;">
                                ${reading.spread.map(card => `
                                    <div class="mini-card" style="flex: 0 0 100px;">
                                        <img src="${card.image_url}" alt="${card.name}" style="width: 100%; border-radius: 5px; border: 1.5px solid var(--color-gold); ${card.is_reversed ? 'transform: rotate(180deg);' : ''}">
                                        <p style="font-size: 0.7rem; margin-top: 5px; font-weight: bold; color: var(--color-gold);">${card.name}${card.is_reversed ? ' <span style="color:#ff8c00; font-size:0.6rem; font-style:italic;">(Reversed)</span>' : ''}</p>
                                        <span style="font-size: 0.6rem; color: var(--color-lavender);">${card.position}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="card-actions">
                            ${reading.status === 'pending' ? `<button onclick="updateStatus('${reading.id}', 'confirmed')" class="btn-primary btn-small">Mark Delivered</button>` : ''}
                            <button onclick="sendAcknowledgement('${reading.name}', '${reading.email}', '${reading.question}')" class="btn-primary btn-small" style="background: rgba(212, 175, 55, 0.1); color: var(--color-gold); border: 1px solid var(--color-gold);">Send Acknowledgment</button>
                            <button onclick="window.print()" class="btn-primary btn-small" style="background: transparent; border: 1px dotted var(--color-gold); color: var(--color-gold); opacity: 0.7;">Print to PDF</button>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error(err);
                listEl.innerHTML = `<p style="color: red; text-align: center;">Error accessing the Archive: ${err.message}</p>`;
            }
        }

        async function updateStatus(id, newStatus) {
            const { error } = await _supabase
                .from('readings')
                .update({ status: newStatus })
                .eq('id', id);
            
            if (error) {
                console.error(error);
                alert("Update failed. Did you run the SQL Update policy?");
            } else {
                fetchReadings();
            }
        }

        async function clearHandled() {
            if (!confirm("Are you sure you want to permanently clear all 'Delivered' requests from the archive? This cannot be undone.")) return;
            
            const { error } = await _supabase
                .from('readings')
                .delete()
                .eq('status', 'confirmed');
            
            if (error) {
                console.error(error);
                alert("Clear failed. Did you run the SQL Delete policy?");
            } else {
                fetchReadings();
            }
        }

        let currentDraftText = "";

        function sendAcknowledgement(name, email, question) {
            const subjectText = `The Mystic Veil - Acknowledging your Reading Request`;
            const bodyText = `Greetings ${name},\n\nI have received your vibration and your question regarding: "${question}".\n\nYour 4-card spread has been cast and I am now beginning my deep interpretation. I will contact you shortly with the full professional reading.\n\nBlessings,\nThe Mystic Veil Reader`;
            
            currentDraftText = `Subject: ${subjectText}\n\n${bodyText}`;

            const subject = encodeURIComponent(subjectText);
            const body = encodeURIComponent(bodyText);

            // Set links
            const gmailLink = document.getElementById('gmail-link');
            const defaultMailLink = document.getElementById('default-mail-link');
            const subtitleEl = document.getElementById('email-modal-subtitle');
            
            subtitleEl.textContent = `Preparing email for ${name} (${email})`;
            gmailLink.href = `https://mail.google.com/mail/?view=cm&fs=1&to=${email}&su=${subject}&body=${body}`;
            defaultMailLink.href = `mailto:${email}?subject=${subject}&body=${body}`;

            // Reset copy status
            document.getElementById('copy-status').style.display = 'none';

            // Show modal
            const overlay = document.getElementById('email-overlay');
            overlay.style.display = 'flex';
        }

        function closeEmailModal() {
            document.getElementById('email-overlay').style.display = 'none';
        }

        async function copyTemplateToClipboard() {
            try {
                await navigator.clipboard.writeText(currentDraftText);
                const statusEl = document.getElementById('copy-status');
                statusEl.style.display = 'block';
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
            } catch (err) {
                console.error("Clipboard copy failed: ", err);
                alert("Failed to copy template automatically. Please select and copy manually.");
            }
        }
        // fetchReadings(); // Now called after unlockArchive()
    </script>

    <!-- Email Options Overlay -->
    <div id="email-overlay" class="animate-fade-in" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: none; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);">
        <div class="glass-panel" style="max-width: 450px; width: 90%; text-align: center; border: 1.5px solid var(--color-gold); position: relative; padding: 2.5rem 2rem;">
            <button onclick="closeEmailModal()" style="position: absolute; top: 1rem; right: 1.5rem; background: transparent; border: none; color: var(--color-lavender); font-size: 1.5rem; cursor: pointer; transition: color 0.2s;" onmouseover="this.style.color='var(--color-gold)'" onmouseout="this.style.color='var(--color-lavender)'">&times;</button>
            <div style="font-size: 2.5rem; margin-bottom: 1rem;">✨</div>
            <h2 id="email-modal-title" style="margin-bottom: 0.5rem; font-size: 1.6rem;">Send Acknowledgment</h2>
            <p id="email-modal-subtitle" style="color: var(--color-lavender); font-size: 0.9rem; margin-bottom: 2rem;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <!-- Gmail Mobile App & Web link -->
                <a id="gmail-link" target="_blank" onclick="closeEmailModal()" class="btn-primary" style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: #ea4335; border-color: #ea4335; color: white;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    Open in Gmail App / Web
                </a>
                
                <!-- Default Email Client -->
                <a id="default-mail-link" onclick="closeEmailModal()" class="btn-primary" style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: transparent; border: 1.5px solid var(--color-gold); color: var(--color-gold);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9.5C2 7 4 5 6.5 5H18c2.2 0 4 1.8 4 4v8Z"/><path d="m22 9-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 9"/></svg>
                    Open Default Mail App
                </a>
                
                <!-- Copy template to clipboard -->
                <button id="copy-template-btn" onclick="copyTemplateToClipboard()" class="btn-primary" style="background: rgba(255, 255, 255, 0.05); border: 1.5px solid var(--glass-border); color: var(--color-lavender); display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    Copy Template to Clipboard
                </button>
            </div>
            <p id="copy-status" style="color: #00ff00; font-size: 0.8rem; margin-top: 1rem; display: none;">Template copied to clipboard!</p>
        </div>
    </div>
</body>
</html>
